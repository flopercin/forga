<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Simulator 3D</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }
    #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        color: white;
        background: rgba(0, 0, 0, 0.5);
        padding: 15px;
        border-radius: 10px;
        pointer-events: none;
    }
    #shop {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        border-radius: 10px;
        color: white;
    }
    button {
        background: #ffaa00;
        border: none;
        padding: 10px;
        margin-top: 10px;
        cursor: pointer;
        border-radius: 5px;
        font-weight: bold;
    }
    button:hover {
        background: #ffcc00;
    }
</style>
</head>
<body>
    <div id="ui">
        <h2>Монеты: <span id="coinCount">0</span></h2>
    </div>
    <div id="shop">
        <h3>Магазин</h3>
        <button id="buyHat" onclick="buyItem('hat', 10)">Купить шляпу (10 монет)</button>
    </div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer;
    let cat, catMixer;
    let coins = [];
    let score = 0;
    
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;
    let canJump = false;

    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    let rotation = 0;

    const clock = new THREE.Clock();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(20, 20, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const floorGeometry = new THREE.PlaneGeometry(100, 100);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x228b22 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const loader = new GLTFLoader();
        loader.load('the_cats_body.glb', function (gltf) {
            cat = gltf.scene;
            cat.scale.set(1, 1, 1);
            cat.position.y = 0;
            cat.castShadow = true;
            scene.add(cat);
        });

        const coinGeometry = new THREE.CylinderGeometry(0.5, 0.5, 0.1, 16);
        const coinMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        
        for (let i = 0; i < 20; i++) {
            let coin = new THREE.Mesh(coinGeometry, coinMaterial);
            coin.position.set(
                (Math.random() - 0.5) * 80,
                0.5,
                (Math.random() - 0.5) * 80
            );
            coin.rotation.x = Math.PI / 2;
            coin.castShadow = true;
            scene.add(coin);
            coins.push(coin);
        }

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);
        window.addEventListener('resize', onWindowResize);
    }

    function onKeyDown(event) {
        switch (event.code) {
            case 'KeyW': moveForward = true; break;
            case 'KeyA': moveLeft = true; break;
            case 'KeyS': moveBackward = true; break;
            case 'KeyD': moveRight = true; break;
            case 'Space': 
                if (canJump) {
                    velocity.y += 15;
                    canJump = false;
                }
                break;
        }
    }

    function onKeyUp(event) {
        switch (event.code) {
            case 'KeyW': moveForward = false; break;
            case 'KeyA': moveLeft = false; break;
            case 'KeyS': moveBackward = false; break;
            case 'KeyD': moveRight = false; break;
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.buyItem = function(item, price) {
        if (score >= price) {
            score -= price;
            document.getElementById('coinCount').innerText = score;
            alert('Куплено!');
        } else {
            alert('Недостаточно монет!');
        }
    }

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        if (cat) {
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 9.8 * 5.0 * delta; 

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveLeft) rotation += 3 * delta;
            if (moveRight) rotation -= 3 * delta;

            cat.rotation.y = rotation;

            if (moveForward || moveBackward) {
                const moveSpeed = 20.0;
                velocity.z -= direction.z * moveSpeed * delta;
            }

            cat.translateX(-velocity.x * delta);
            cat.translateZ(velocity.z * delta);
            cat.position.y += velocity.y * delta;

            if (cat.position.y < 0) {
                velocity.y = 0;
                cat.position.y = 0;
                canJump = true;
            }

            camera.position.x = cat.position.x - Math.sin(cat.rotation.y) * 10;
            camera.position.z = cat.position.z - Math.cos(cat.rotation.y) * 10;
            camera.position.y = cat.position.y + 5;
            camera.lookAt(cat.position);

            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].rotation.z += 2 * delta;
                
                let distance = cat.position.distanceTo(coins[i].position);
                if (distance < 2) {
                    scene.remove(coins[i]);
                    coins.splice(i, 1);
                    score += 1;
                    document.getElementById('coinCount').innerText = score;
                }
            }
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
